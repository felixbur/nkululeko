name: SonarQube Cloud

on:
  push:
    branches:
      - master
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  coverage:
    name: Run pytest with coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e .
          uv pip install -r requirements-test.txt pytest-cov

      - name: Run pytest with coverage
        run: |
          source .venv/bin/activate
          set -o pipefail
          pytest --cov=nkululeko tests/
        continue-on-error: true

